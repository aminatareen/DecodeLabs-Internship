<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlushBloom Beauty</title>

    <link rel="stylesheet" href="style.css">

   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">


        <div class="left-side">
            <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=800"
                alt="Beauty Girl" class="top-image">
        </div>

     

        <div class="form-box">

            <h1>BlushBloom Beauty</h1>

            <h2>Create Your Account 💄</h2>

            <p class="subtitle">
                Join Our Beauty Community Today!
            </p>

            <form id="signupForm">


                <label for="name">Full Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name">

                <small id="nameError"></small>


          

                <label for="email">Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email">

                <small id="emailError"></small>


         

                <label for="password">Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Create your password">

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <small id="passwordError"></small>

                <div id="strengthMessage"></div>


              

                <label for="confirmPassword">Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm your password">

                    <i class="fa-solid fa-eye" id="toggleConfirm"></i>

                </div>

                <small id="confirmError"></small>


              

                <div class="remember">

                    <input
                        type="checkbox"
                        id="remember">

                    <label for="remember">
                        Remember Me
                    </label>

                </div>


             

                <button type="submit">

                    Create My Account 

                </button>


                <p id="successMessage"></p>

            </form>

            <div class="login">

                Already have an account?

                <a href="#">Sign In</a>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
